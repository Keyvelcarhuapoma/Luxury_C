<section class="resource-page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Recursos</p>
      <h1>{{ titulo }}</h1>
      <p>{{ descripcion }}</p>
    </div>
  </header>

  @if (cargando()) {
    <div class="state">Cargando consumos...</div>
  } @else {
    <div class="stat-grid">
      <app-resource-stat-card
        label="Consumo total"
        [value]="formatearNumero(totalCantidad()) + ' ' + unidad()"
        [detail]="'Periodo ' + periodoActual"
      />
      <app-resource-stat-card label="Costo total" [value]="formatearMonto(totalCosto())" detail="Moneda PEN" />
      <app-resource-stat-card label="Sedes" [value]="sedes().length.toString()" detail="Con registros activos" />
      <app-resource-stat-card
        label="Observados"
        [value]="observados().toString()"
        detail="Revisar antes de validar"
        [tone]="observados() > 0 ? 'warning' : 'neutral'"
      />
    </div>

    <app-consumption-table [consumos]="consumosFiltrados()" [mostrarTipo]="false" />
  }
</section>
