<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Usuarios - Luxury</title><link rel="stylesheet" th:href="@{/css/app.css}"></head>
<body>
<header class="topbar"><div class="brand">Luxury</div><nav th:replace="~{fragments/navbar :: nav}"></nav></header>
<main class="container">
	<h1>Gestion de usuarios</h1>
	<div class="message" th:if="${successMessage}" th:text="${successMessage}"></div>
	<div class="error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
	<div class="actions">
		<a class="button" th:href="@{/usuarios/registrar}">Registrar usuario</a>
		<form method="get" th:action="@{/usuarios}" class="inline" style="margin-left:auto;">
			<select name="estado" onchange="this.form.submit()">
				<option value="" th:selected="${estadoSeleccionado == null or estadoSeleccionado == ''}">Todos</option>
				<option value="ACTIVO" th:selected="${estadoSeleccionado == 'ACTIVO'}">Activos</option>
				<option value="INACTIVO" th:selected="${estadoSeleccionado == 'INACTIVO'}">Inactivos</option>
			</select>
		</form>
	</div>
	<div class="table-container">
<table>
		<thead><tr><th>ID</th><th>Nombre</th><th>Email</th><th>Estado</th><th>Roles</th><th>Acciones</th></tr></thead>
		<tbody>
		<tr th:each="usuario : ${usuarios}">
			<td th:text="${usuario.id}"></td>
			<td th:text="${usuario.nombreCompleto}"></td>
			<td th:text="${usuario.correo}"></td>
			<td th:text="${usuario.estado}"></td>
			<td th:text="${usuario.roles}"></td>
			<td>
				<a th:href="@{/usuarios/{id}(id=${usuario.id})}">Ver</a>
				<a th:href="@{/usuarios/{id}/editar(id=${usuario.id})}">Editar</a>
				<form class="inline" th:action="@{/usuarios/{id}/toggle-estado(id=${usuario.id})}" method="post"><button th:class="${usuario.activo ? 'danger' : 'primary'}" type="submit" th:text="${usuario.activo ? 'Desactivar' : 'Activar'}">Desactivar</button></form>
			</td>
		</tr>
		</tbody>
	</table>
</div>
</main>
</body>
</html>
